<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智能内容审核工作台</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: #1a3c5e; border-bottom: 3px solid #2a6f97; padding-bottom: 10px; }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .card h2 { margin-top: 0; font-size: 18px; }
        
        .upload-area {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .upload-area input[type="file"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #2a6f97; color: white; }
        .btn-primary:hover { background: #1a4f6e; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
        
        .result-area {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            min-height: 24px;
            font-weight: bold;
        }
        .result-area.success { color: #28a745; }
        .result-area.error { color: #dc3545; }
        .result-area.loading { color: #ffc107; }
        
        .job-list table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }
        .job-list th, .job-list td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .job-list th { background: #f7f9fa; font-weight: 600; }
        .job-list .job-id { font-family: monospace; font-size: 12px; color: #666; }
        .job-list button {
            padding: 4px 12px;
            font-size: 12px;
            background: #2a6f97;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .tag {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
        }
        .tag-pass { background: #d4edda; color: #155724; }
        .tag-review { background: #fff3cd; color: #856404; }
        .tag-reject { background: #f8d7da; color: #721c24; }
        .tag-created { background: #e2e3e5; color: #383d41; }
        
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin: 10px 0;
        }
        .detail-grid div {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
        }
        .detail-grid strong {
            display: block;
            color: #666;
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        #detailContent h4 { margin: 15px 0 5px 0; color: #1a3c5e; }
        #detailContent img, #detailContent video {
            max-width: 300px;
            max-height: 300px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin: 5px 5px 5px 0;
        }
        .evidence-thumbs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .evidence-thumbs img {
            width: 200px;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .hidden { display: none; }
        
        @media (max-width: 768px) {
            .detail-grid { grid-template-columns: 1fr 1fr; }
            .upload-area { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ 智能内容审核工作台</h1>

        <!-- 上传 -->
        <div class="card">
            <h2>📤 新建审核任务</h2>
            <div class="upload-area">
                <input type="file" id="fileInput" accept="image/*,video/*">
                <input type="text" id="projectNameInput" placeholder="项目名称（可选）" style="padding:8px;border:1px solid #ddd;border-radius:4px;width:200px;">
                <button class="btn-primary" id="uploadBtn">📤 上传并创建任务</button>
            </div>
            <div id="uploadResult" class="result-area"></div>
        </div>

        <!-- 任务列表 -->
        <div class="card">
            <h2>📋 任务列表 <button class="btn-secondary" id="refreshBtn" style="font-size:12px;">🔄 刷新</button></h2>
            <div id="jobList" class="job-list">
                <p style="color:#999;">加载中...</p>
            </div>
        </div>

        <!-- 任务详情 -->
        <div class="card hidden" id="detailCard">
            <h2>📄 任务详情</h2>
            <div id="detailContent"></div>
            <div class="btn-group">
                <button class="btn-primary" id="analyzeBtn">▶ 启动审核</button>
                <button class="btn-secondary" id="downloadReportBtn">📄 下载报告</button>
                <button class="btn-secondary" id="downloadEvidenceBtn">🖼️ 下载证据</button>
                <button class="btn-danger" id="deleteJobBtn">🗑️ 删除任务</button>
            </div>
            <div id="detailResult" class="result-area"></div>
        </div>

        <!-- 人工复核 -->
        <div class="card hidden" id="reviewCard">
            <h2>✏️ 人工复核</h2>
            <div class="btn-group">
                <button class="btn-success" id="reviewPassBtn">✅ 通过</button>
                <button class="btn-warning" id="reviewReviewBtn">🔍 待复核</button>
                <button class="btn-danger" id="reviewRejectBtn">❌ 不通过</button>
            </div>
            <input type="text" id="reviewNote" placeholder="复核备注（可选）" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;margin-top:10px;">
            <div id="reviewResult" class="result-area"></div>
        </div>
    </div>

    <script>
        // ===================== 全局变量 =====================
        var currentJobId = null;
        var pollTimer = null;

        // ===================== 工具函数 =====================
        function showMessage(elId, msg, type) {
            var el = document.getElementById(elId);
            if (!el) return;
            el.textContent = msg;
            el.className = 'result-area';
            if (type === 'success') el.classList.add('success');
            else if (type === 'error') el.classList.add('error');
            else if (type === 'loading') el.classList.add('loading');
        }

        function getJobId() { return currentJobId; }

        // ===================== 1. 上传 =====================
        document.getElementById('uploadBtn').onclick = function() {
            var file = document.getElementById('fileInput').files[0];
            if (!file) {
                showMessage('uploadResult', '⚠️ 请先选择文件', 'error');
                return;
            }

            var formData = new FormData();
            formData.append('file', file);
            var name = document.getElementById('projectNameInput').value.trim();
            if (name) formData.append('project_name', name);

            showMessage('uploadResult', '⏳ 上传中...', 'loading');
            this.disabled = true;

            fetch('/api/jobs', { method: 'POST', body: formData })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.job_id) {
                    showMessage('uploadResult', '✅ 上传成功！任务ID：' + data.job_id, 'success');
                    loadJobList();
                    viewJobDetail(data.job_id);
                } else {
                    showMessage('uploadResult', '❌ ' + (data.error || '上传失败'), 'error');
                }
            })
            .catch(function(e) {
                showMessage('uploadResult', '❌ 请求失败：' + e, 'error');
            })
            .finally(function() {
                document.getElementById('uploadBtn').disabled = false;
            });
        };

        // ===================== 2. 任务列表 =====================
        function loadJobList() {
            fetch('/api/jobs')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var el = document.getElementById('jobList');
                if (!data || !data.length) {
                    el.innerHTML = '<p style="color:#999;">暂无任务</p>';
                    return;
                }
                var html = '<table><thead><tr><th>任务ID</th><th>文件名</th><th>状态</th><th>结论</th><th></th></tr></thead><tbody>';
                data.forEach(function(j) {
                    var v = j.verdict || '待审核';
                    var tagClass = v === 'pass' ? 'tag-pass' : (v === 'review' ? 'tag-review' : (v === 'reject' ? 'tag-reject' : 'tag-created'));
                    html += '<tr>' +
                        '<td class="job-id">' + j.job_id + '</td>' +
                        '<td>' + (j.asset_name || '-') + '</td>' +
                        '<td>' + (j.status || 'created') + '</td>' +
                        '<td><span class="tag ' + tagClass + '">' + v + '</span></td>' +
                        '<td><button onclick="viewJobDetail(\'' + j.job_id + '\')">查看</button></td>' +
                        '</tr>';
                });
                html += '</tbody></table>';
                el.innerHTML = html;
            })
            .catch(function() {
                document.getElementById('jobList').innerHTML = '<p style="color:#dc3545;">加载失败</p>';
            });
        }
        document.getElementById('refreshBtn').onclick = loadJobList;

        // ===================== 3. 任务详情 =====================
        function viewJobDetail(jobId) {
            currentJobId = jobId;
            document.getElementById('detailCard').classList.remove('hidden');
            document.getElementById('reviewCard').classList.add('hidden');
            showMessage('detailResult', '⏳ 加载中...', 'loading');

            fetch('/api/jobs/' + jobId)
            .then(function(r) { return r.json(); })
            .then(function(j) {
                var content = document.getElementById('detailContent');
                var v = j.verdict || '待审核';
                var tagClass = v === 'pass' ? 'tag-pass' : (v === 'review' ? 'tag-review' : (v === 'reject' ? 'tag-reject' : 'tag-created'));

                var html = '<div class="detail-grid">';
                html += '<div><strong>任务ID</strong><br>' + j.job_id + '</div>';
                html += '<div><strong>文件名</strong><br>' + (j.asset_name || '-') + '</div>';
                html += '<div><strong>状态</strong><br>' + (j.status || 'created') + '</div>';
                html += '<div><strong>结论</strong><br><span class="tag ' + tagClass + '">' + v + '</span></div>';
                html += '<div><strong>创建时间</strong><br>' + (j.created_at || '-') + '</div>';
                html += '<div><strong>完成时间</strong><br>' + (j.completed_at || '-') + '</div>';
                html += '</div>';

                // 显示原始素材预览
                if (j.asset_name) {
                    var ext = j.asset_name.split('.').pop().toLowerCase();
                    var inputUrl = '/api/jobs/' + jobId + '/input/' + encodeURIComponent(j.asset_name);
                    html += '<h4>原始素材</h4>';
                    if (['jpg','jpeg','png'].includes(ext)) {
                        html += '<img src="' + inputUrl + '" onerror="this.style.display=\'none\'">';
                    } else if (['mp4','avi','mov','mkv'].includes(ext)) {
                        html += '<video controls width="300" src="' + inputUrl + '"></video>';
                    } else {
                        html += '<p>' + j.asset_name + '</p>';
                    }
                }

                if (j.result) {
                    html += '<h4>检测结果</h4><div class="detail-grid">';
                    html += '<div><strong>检测目标数</strong><br>' + (j.result.total_detections || 0) + '</div>';
                    html += '<div><strong>机器结论</strong><br>' + (j.result.verdict || '-') + '</div>';
                    html += '<div><strong>原因</strong><br>' + (j.result.reason || '-') + '</div>';
                    html += '</div>';

                    // 显示证据图片（支持多张）
                    var evidenceFiles = j.result.evidence_filenames || [];
                    if (j.result.evidence_path && evidenceFiles.length === 0) {
                        // 兼容旧格式：如果只有 evidence_path，则作为单张
                        evidenceFiles = [j.result.evidence_path];
                    }
                    if (evidenceFiles.length > 0) {
                        html += '<h4>证据帧</h4><div class="evidence-thumbs">';
                        evidenceFiles.forEach(function(fname) {
                            var url = '/api/jobs/' + jobId + '/evidence/' + encodeURIComponent(fname);
                            html += '<img src="' + url + '" onerror="this.style.display=\'none\'" title="' + fname + '">';
                        });
                        html += '</div>';
                    }
                }

                if (j.review) {
                    html += '<h4>人工复核</h4><div class="detail-grid">';
                    html += '<div><strong>原结论</strong><br>' + (j.review.original_verdict || '-') + '</div>';
                    html += '<div><strong>新结论</strong><br>' + (j.review.new_verdict || '-') + '</div>';
                    html += '<div><strong>备注</strong><br>' + (j.review.note || '-') + '</div>';
                    html += '</div>';
                }

                content.innerHTML = html;
                showMessage('detailResult', '✅ 加载完成', 'success');

                if (j.status === 'completed') {
                    document.getElementById('reviewCard').classList.remove('hidden');
                } else {
                    document.getElementById('reviewCard').classList.add('hidden');
                }

                if (j.status === 'queued' || j.status === 'running') {
                    startPolling(jobId);
                } else {
                    stopPolling();
                }
            })
            .catch(function(e) {
                showMessage('detailResult', '❌ 加载失败：' + e, 'error');
            });
        }

        // ===================== 4. 启动审核 =====================
        document.getElementById('analyzeBtn').onclick = function() {
            var id = getJobId();
            if (!id) return;
            showMessage('detailResult', '⏳ 正在启动...', 'loading');
            this.disabled = true;

            fetch('/api/jobs/' + id + '/analyze', { method: 'POST' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.ok) {
                    showMessage('detailResult', '⏳ 审核已启动，等待完成...', 'loading');
                    startPolling(id);
                } else {
                    showMessage('detailResult', '❌ ' + (data.error || '启动失败'), 'error');
                }
            })
            .catch(function(e) {
                showMessage('detailResult', '❌ ' + e, 'error');
            })
            .finally(function() {
                document.getElementById('analyzeBtn').disabled = false;
            });
        };

        // ===================== 5. 人工复核 =====================
        function doReview(verdict) {
            var id = getJobId();
            if (!id) return;
            var note = document.getElementById('reviewNote').value || '';
            fetch('/api/jobs/' + id + '/review', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ verdict: verdict, note: note })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.ok) {
                    document.getElementById('reviewResult').textContent = '✅ 复核成功！结论：' + verdict;
                    document.getElementById('reviewResult').className = 'result-area success';
                    viewJobDetail(id);
                    loadJobList();
                } else {
                    document.getElementById('reviewResult').textContent = '❌ ' + (data.error || '复核失败');
                    document.getElementById('reviewResult').className = 'result-area error';
                }
            })
            .catch(function(e) {
                document.getElementById('reviewResult').textContent = '❌ ' + e;
                document.getElementById('reviewResult').className = 'result-area error';
            });
        }
        document.getElementById('reviewPassBtn').onclick = function() { doReview('pass'); };
        document.getElementById('reviewReviewBtn').onclick = function() { doReview('review'); };
        document.getElementById('reviewRejectBtn').onclick = function() { doReview('reject'); };

        // ===================== 6. 下载 =====================
        document.getElementById('downloadReportBtn').onclick = function() {
            var id = getJobId();
            if (id) window.open('/api/jobs/' + id + '/report', '_blank');
        };
        document.getElementById('downloadEvidenceBtn').onclick = function() {
            var id = getJobId();
            if (id) window.open('/api/jobs/' + id + '/evidence', '_blank');
        };

        // ===================== 7. 删除 =====================
        document.getElementById('deleteJobBtn').onclick = function() {
            var id = getJobId();
            if (!id) return;
            if (!confirm('确认删除任务 ' + id + ' 吗？')) return;
            fetch('/api/jobs/' + id, { method: 'DELETE' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.ok) {
                    showMessage('detailResult', '✅ 任务已删除', 'success');
                    document.getElementById('detailCard').classList.add('hidden');
                    document.getElementById('reviewCard').classList.add('hidden');
                    loadJobList();
                } else {
                    showMessage('detailResult', '❌ ' + (data.error || '删除失败'), 'error');
                }
            });
        };

        // ===================== 轮询 =====================
        function startPolling(id) {
            stopPolling();
            pollTimer = setInterval(function() {
                fetch('/api/jobs/' + id)
                .then(function(r) { return r.json(); })
                .then(function(j) {
                    if (j.status === 'completed' || j.status === 'failed') {
                        stopPolling();
                        viewJobDetail(id);
                        loadJobList();
                        showMessage('detailResult', '✅ 审核完成！结论：' + (j.verdict || '-'), 'success');
                    } else {
                        showMessage('detailResult', '⏳ 审核中... 状态：' + j.status, 'loading');
                    }
                })
                .catch(function() {});
            }, 2000);
        }
        function stopPolling() {
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        }

        // ===================== 启动 =====================
        loadJobList();

        // 如果URL有 job_id 参数，自动打开
        var params = new URLSearchParams(window.location.search);
        var id = params.get('job_id');
        if (id) viewJobDetail(id);
    </script>
</body>
</html>
